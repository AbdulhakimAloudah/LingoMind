<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LingoMind</title>
<style>
:root{
--green:#1D9E75;--green-dim:#1D9E7520;--green-light:#9FE1CB;
--bg:#111;--bg2:#1a1a1a;--bg3:#1e1e1e;--bg4:#161616;
--border:#2a2a2a;--border2:#222;
--text:#e8e8e8;--text2:#aaa;--text3:#666;
--amber:#FAC775;--amber-dim:#BA751722;--amber-border:#BA751755;
--red:#F09595;--red-dim:#E24B4A22;--red-border:#E24B4A55;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:-webkit-fill-available;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;direction:rtl;overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available}
.page{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.page.active{display:flex}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.topbar-title{font-size:17px;font-weight:600;color:var(--text)}
.btn{padding:0 16px;height:36px;border-radius:18px;border:none;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;display:inline-flex;align-items:center;justify-content:center}
.btn-primary{background:var(--green);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn:active{opacity:.75}
.scroll-area{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.session-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.session-card:active{background:#242424}
.s-icon{width:46px;height:46px;border-radius:12px;background:var(--green-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.s-info{flex:1;min-width:0}
.s-name{font-size:15px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-date{font-size:12px;color:var(--text3);margin-top:3px}
.s-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:8px;font-size:18px;border-radius:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-icon{font-size:52px;margin-bottom:16px}
.form-group{margin-bottom:18px}
.form-label{font-size:13px;color:var(--text2);margin-bottom:7px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;font-family:inherit;resize:vertical;min-height:44px}
.form-input:focus{border-color:var(--green)}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;font-family:inherit;min-height:48px;appearance:none;-webkit-appearance:none}
.lang-row{display:flex;align-items:center;gap:8px}
.lang-row .form-select{flex:1}
.swap-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:0 12px;color:var(--text2);cursor:pointer;font-size:18px;height:48px;min-width:48px;font-family:inherit}
.cb-group{display:flex;flex-direction:column;gap:10px}
.cb-item{display:flex;align-items:center;gap:10px;cursor:pointer;min-height:44px}
.cb-item input{accent-color:var(--green);width:18px;height:18px;flex-shrink:0}
.cb-item span{font-size:15px;color:var(--text2)}
.start-btn{width:100%;padding:16px;font-size:16px;border-radius:14px;margin-top:12px;background:var(--green);color:#fff;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.session-layout{flex:1;display:flex;overflow:hidden;min-height:0}
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.panel-border{border-left:1px solid var(--border2)}
.panel-hdr{padding:10px 14px;background:var(--bg4);border-bottom:1px solid var(--border2);font-size:13px;color:var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.panel-hdr-badge{font-size:11px;background:var(--bg3);padding:2px 8px;border-radius:10px;color:var(--text3)}
.trans-area{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.sentence{padding:10px 12px;margin-bottom:6px;border-radius:10px;font-size:15px;line-height:1.7;color:#d8d8d8;border-right:3px solid transparent;transition:background .3s,border-color .3s}
.sentence.streaming{border-right-color:#444;color:#aaa}
.sentence.hl{background:var(--green-dim);border-right-color:var(--green);color:#fff}
.ai-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.alert-bub{background:var(--amber-dim);border:1px solid var(--amber-border);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--amber);line-height:1.6}
.alert-bub.urgent{background:var(--red-dim);border-color:var(--red-border);color:var(--red)}
.ai-msg{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;max-width:88%}
.ai-msg.user{background:var(--green-dim);color:var(--green-light);align-self:flex-start}
.ai-msg.bot{background:var(--bg3);color:#d8d8d8;border:1px solid var(--border);align-self:flex-end}
.quick-bar{display:flex;gap:8px;padding:8px 12px;overflow-x:auto;flex-shrink:0;background:var(--bg4);border-top:1px solid var(--border2);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.quick-bar::-webkit-scrollbar{display:none}
.qbtn{background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:7px 14px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;min-height:36px}
.qbtn:active{border-color:var(--green);color:var(--green)}
.chat-bar{background:var(--bg4);border-top:1px solid var(--border2);padding:10px 12px;display:flex;gap:8px;align-items:center;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.chat-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:22px;padding:10px 16px;color:var(--text);font-size:15px;outline:none;font-family:inherit;min-height:44px}
.chat-inp:focus{border-color:var(--green)}
.send-btn{background:var(--green);border:none;border-radius:50%;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{fill:white;width:18px;height:18px}
.mic-wrap{padding:12px;background:var(--bg4);border-top:1px solid var(--border2);display:flex;justify-content:center;flex-shrink:0}
.mic-btn{border:none;border-radius:50%;width:64px;height:64px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--green);transition:background .2s}
.mic-btn.rec{background:#E24B4A;animation:pulse 1s infinite}
.mic-btn svg{fill:white;width:26px;height:26px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--border);display:inline-block}
.sdot.on{background:var(--green)}
.sdot.lis{background:#E24B4A;animation:pulse 1s infinite}
.ldot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);animation:lp .8s infinite;margin:0 2px}
.ldot:nth-child(2){animation-delay:.2s}
.ldot:nth-child(3){animation-delay:.4s}
@keyframes lp{0%,100%{opacity:.25}50%{opacity:1}}
.bottom-tabs{background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:max(0px,env(safe-area-inset-bottom));flex-shrink:0}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 0;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:11px;font-family:inherit;min-height:56px}
.tab-btn.active{color:var(--green)}
.tab-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.mob-panel{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.mob-panel.active{display:flex}
@media(min-width:700px){
  .bottom-tabs{display:none}
  .mob-panel{display:flex!important}
  .session-layout{flex-direction:row}
}
@media(max-width:699px){
  .panel-border{border-left:none}
  .session-layout{flex-direction:column}
}
</style>
</head>
<body>
<div class="app">

<div id="pg-home" class="page active">
  <div class="topbar">
    <div class="topbar-title">LingoMind</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="gotoPage('settings')" style="padding:0 12px;font-size:13px">الإعدادات</button>
      <button class="btn btn-primary" onclick="gotoPage('setup')">+ جلسة</button>
    </div>
  </div>
  <div class="scroll-area" id="sess-list">
    <div class="empty" id="empty-msg">
      <div class="empty-icon">🎙</div>
      <p style="font-size:16px;color:var(--text2)">لا توجد جلسات بعد</p>
      <p style="font-size:13px;margin-top:8px">اضغط على "+ جلسة" للبدء</p>
    </div>
  </div>
</div>

<div id="pg-setup" class="page">
  <div class="topbar">
    <div class="topbar-title">جلسة جديدة</div>
    <button class="btn btn-ghost" onclick="gotoPage('home')" style="padding:0 12px;font-size:13px">رجوع</button>
  </div>
  <div class="scroll-area">
    <div class="form-group">
      <label class="form-label">اسم الجلسة *</label>
      <input class="form-input" id="f-name" placeholder="مثال: اجتماع مع التاجر الصيني">
    </div>
    <div class="form-group">
      <label class="form-label">السياق (اختياري)</label>
      <textarea class="form-input" id="f-ctx" rows="3" placeholder="مثال: أنا تاجر أبحث عن شنط جلدية بسعر الجملة"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">لغة المتحدث → لغة الترجمة</label>
      <div class="lang-row">
        <select class="form-select" id="f-src">
          <option value="zh-CN">صيني</option>
          <option value="ar">عربي</option>
          <option value="en-US">إنجليزي</option>
          <option value="fr-FR">فرنسي</option>
          <option value="de-DE">ألماني</option>
          <option value="ja-JP">ياباني</option>
          <option value="ko-KR">كوري</option>
          <option value="ru-RU">روسي</option>
          <option value="tr-TR">تركي</option>
        </select>
        <button class="swap-btn" onclick="swapL()">⇄</button>
        <select class="form-select" id="f-tgt">
          <option value="ar">عربي</option>
          <option value="en">إنجليزي</option>
          <option value="zh">صيني</option>
          <option value="fr">فرنسي</option>
          <option value="de">ألماني</option>
          <option value="tr">تركي</option>
          <option value="ru">روسي</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">نبّهني عن</label>
      <div class="cb-group">
        <label class="cb-item"><input type="checkbox" id="cb-price" checked><span>الأسعار والأرقام</span></label>
        <label class="cb-item"><input type="checkbox" id="cb-date" checked><span>المواعيد والتواريخ</span></label>
        <label class="cb-item"><input type="checkbox" id="cb-prod"><span>المنتجات والمواصفات</span></label>
        <label class="cb-item"><input type="checkbox" id="cb-task"><span>الطلبات والمهام</span></label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">تعليمات إضافية (اختياري)</label>
      <textarea class="form-input" id="f-extra" rows="2" placeholder="مثال: نبّهني إذا ذكر شروط الدفع"></textarea>
    </div>
    <button class="start-btn" onclick="startSess()">ابدأ الجلسة</button>
  </div>
</div>

<div id="pg-session" class="page">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px;min-width:0">
      <button class="btn btn-ghost" onclick="exitSess()" style="padding:0 10px;font-size:13px;flex-shrink:0">خروج</button>
      <div class="topbar-title" id="sess-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <div class="sdot" id="sdot"></div>
      <span style="font-size:12px;color:var(--text3)" id="stxt">جاهز</span>
    </div>
  </div>
  <div class="session-layout">
    <div class="panel mob-panel active" id="mob-trans">
      <div class="panel-hdr">
        <span style="color:var(--text2)">الترجمة الفورية</span>
        <span class="panel-hdr-badge" id="sent-count">0 جملة</span>
      </div>
      <div class="trans-area" id="trans-area"></div>
      <div class="mic-wrap">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
          <svg viewBox="0 0 24 24" fill="white"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm7 8a1 1 0 0 1 1 1 8 8 0 0 1-7 7.94V22h-2v-2.06A8 8 0 0 1 4 12a1 1 0 0 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"/></svg>
        </button>
      </div>
    </div>
    <div class="panel mob-panel panel-border" id="mob-ai">
      <div class="panel-hdr">
        <span style="color:var(--text2)">المساعد الذكي</span>
        <div class="sdot" id="ai-dot"></div>
      </div>
      <div class="ai-area" id="ai-area"></div>
      <div class="quick-bar">
        <button class="qbtn" onclick="qSend('لخص ما قيل حتى الآن')">لخص المحادثة</button>
        <button class="qbtn" onclick="qSend('ما هي الأسعار التي ذُكرت؟')">الأسعار</button>
        <button class="qbtn" onclick="qSend('ما هي المواعيد التي ذُكرت؟')">المواعيد</button>
        <button class="qbtn" onclick="qSend('ما هي أهم النقاط؟')">أهم النقاط</button>
      </div>
      <div class="chat-bar">
        <input class="chat-inp" id="chat-inp" placeholder="اسأل عن المحادثة..." onkeydown="if(event.key==='Enter')doChat()">
        <button class="send-btn" onclick="doChat()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9-21-9v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="bottom-tabs">
    <button class="tab-btn active" id="tab-trans" onclick="switchTab('trans')">
      <svg viewBox="0 0 24 24"><path d="M3 5h12M9 3v2m-4.5 9.5A4.5 4.5 0 1 0 9 21m6-10v6m0 0l-3-3m3 3l3-3M17 3l5 5-5 5"/></svg>
      الترجمة
    </button>
    <button class="tab-btn" id="tab-mic" onclick="toggleMic()" style="flex:1.5">
      <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8"/></svg>
      <span id="mic-tab-lbl">ميكروفون</span>
    </button>
    <button class="tab-btn" id="tab-ai" onclick="switchTab('ai')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      المساعد
    </button>
  </div>
</div>

<div id="pg-settings" class="page">
  <div class="topbar">
    <div class="topbar-title">الإعدادات</div>
    <button class="btn btn-ghost" onclick="gotoPage('home')" style="padding:0 12px;font-size:13px">رجوع</button>
  </div>
  <div class="scroll-area">
    <div class="form-group">
      <label class="form-label">مفتاح جيميناي</label>
      <input class="form-input" id="g-key" type="password" placeholder="AIzaSy...">
    </div>
    <button class="start-btn" onclick="saveSet()">حفظ</button>
    <div style="margin-top:16px;padding:14px;background:var(--bg3);border-radius:12px;border:1px solid var(--border);font-size:13px;color:var(--text3);line-height:1.8">المفتاح يُحفظ في جهازك فقط.</div>
    <div style="margin-top:14px">
      <button onclick="clearAll()" style="width:100%;padding:14px;background:var(--red-dim);color:var(--red);border:1px solid var(--red-border);border-radius:12px;cursor:pointer;font-family:inherit;font-size:15px">حذف جميع البيانات</button>
    </div>
  </div>
</div>

</div>
<script>
const GK = 'AIzaSyDrJGScg0_hbie0nMXLvnXeL-d3AZOrnic';
let sessions = JSON.parse(localStorage.getItem('lm3_sess') || '[]');
let cur = null, rec = null, isRec = false, silT = null;
let sCount = 0, chatH = [], sentences = [];
let isProcessing = false;

function gotoPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pg-' + id).classList.add('active');
  if (id === 'home') renderList();
  if (id === 'settings') document.getElementById('g-key').value = localStorage.getItem('lm3_gk') || '';
}

function renderList() {
  const el = document.getElementById('sess-list');
  el.querySelectorAll('.session-card').forEach(e => e.remove());
  const empty = document.getElementById('empty-msg');
  if (!sessions.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  [...sessions].reverse().forEach(s => {
    const d = document.createElement('div');
    d.className = 'session-card';
    d.innerHTML = '<div class="s-icon">🎙</div><div class="s-info"><div class="s-name">' + s.name + '</div><div class="s-date">' + new Date(s.ts).toLocaleDateString('ar') + '</div></div><button class="s-del" onclick="delSess(event,\'' + s.id + '\')">✕</button>';
    d.onclick = () => openSess(s.id);
    el.appendChild(d);
  });
}

function delSess(e, id) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  save(); renderList();
}

function swapL() {
  const a = document.getElementById('f-src'), b = document.getElementById('f-tgt');
  const t = a.value; a.value = b.value; b.value = t;
}

function getAlerts() {
  const a = [];
  if (document.getElementById('cb-price').checked) a.push('الأسعار والأرقام');
  if (document.getElementById('cb-date').checked) a.push('المواعيد والتواريخ');
  if (document.getElementById('cb-prod').checked) a.push('المنتجات والمواصفات');
  if (document.getElementById('cb-task').checked) a.push('الطلبات والمهام');
  return a;
}

function startSess() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('الرجاء كتابة اسم الجلسة'); return; }
  const s = {
    id: 's' + Date.now(), name,
    ctx: document.getElementById('f-ctx').value.trim(),
    src: document.getElementById('f-src').value,
    tgt: document.getElementById('f-tgt').value,
    alerts: getAlerts(),
    extra: document.getElementById('f-extra').value.trim(),
    ts: Date.now(), sentences: [], chatH: []
  };
  sessions.push(s); save(); openSess(s.id);
}

function openSess(id) {
  cur = sessions.find(s => s.id === id);
  if (!cur) return;
  document.getElementById('sess-title').textContent = cur.name;
  sCount = 0; chatH = [...(cur.chatH || [])]; sentences = [...(cur.sentences || [])];
  document.getElementById('trans-area').innerHTML = '';
  document.getElementById('ai-area').innerHTML = '';
  sentences.forEach(s => addLine(s.orig, s.tr, s.id, false));
  (cur.chatH || []).forEach(m => { if (m.r === 'u') addMsg(m.t, 'user', false); else addMsg(m.t, 'bot', false); });
  sCount = sentences.length; updCount();
  switchTab('trans'); gotoPage('session');
}

function exitSess() { if (isRec) stopRec(); saveCur(); gotoPage('home'); }
function save() { localStorage.setItem('lm3_sess', JSON.stringify(sessions)); }
function saveCur() {
  if (!cur) return;
  cur.sentences = sentences; cur.chatH = chatH;
  const i = sessions.findIndex(s => s.id === cur.id);
  if (i >= 0) sessions[i] = cur; save();
}
function saveSet() {
  const v = document.getElementById('g-key').value.trim();
  if (v) localStorage.setItem('lm3_gk', v);
  gotoPage('home');
}
function getGK() { return localStorage.getItem('lm3_gk') || GK; }
function clearAll() { if (confirm('حذف جميع البيانات؟')) { localStorage.clear(); sessions = []; gotoPage('home'); } }

function sysProm() {
  const al = cur.alerts.join('، ');
  const ex = cur.extra ? '\nتعليمات إضافية: ' + cur.extra : '';
  const ct = cur.ctx ? '\nالسياق: ' + cur.ctx : '';
  return `أنت سكرتير شخصي متعدد اللغات.${ct}

مهمتك: ترجم النص إلى ${langName(cur.tgt)} ترجمة سياقية طبيعية، ثم إذا وجدت ما يخص: ${al} أضف تنبيهاً.${ex}

أرجع ردك بهذا الشكل الحرفي فقط بدون أي كلام إضافي:
TRANSLATION: [النص المترجم]
ALERT: [التنبيه أو NONE]
URGENT: [true أو false]

قواعد:
- الترجمة سياقية وليست حرفية
- إذا لا يوجد تنبيه اكتب ALERT: NONE
- لا تضف أي نص خارج الصيغة أعلاه`;
}

function sysPromChat() {
  const al = cur.alerts.join('، ');
  const ct = cur.ctx ? '\nالسياق: ' + cur.ctx : '';
  const context = sentences.length ? '\n\nنص الجلسة:\n' + sentences.map(s => '[' + s.id + '] ' + s.orig).join('\n') : '';
  return `أنت سكرتير شخصي متعدد اللغات.${ct}${context}

أجب على أسئلة المستخدم من نص الجلسة فقط. إذا كان السؤال خارج الجلسة قل: هذا السؤال خارج نطاق جلستك.
ردودك دائماً بالعربية. إذا أجبت من جملة معينة اذكر رقمها هكذا: [ref:رقم]`;
}

async function callGeminiStream(text, sentEl) {
  const key = getGK();
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:streamGenerateContent?alt=sse&key=${key}`;

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ role: 'user', parts: [{ text: sysProm() + '\n\nالنص: "' + text + '"' }] }],
      generationConfig: { temperature: 0.2, maxOutputTokens: 300 }
    })
  });

  if (!res.ok) throw new Error(res.status);

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullText = '';
  let translationShown = false;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const parsed = JSON.parse(data);
        const chunk = parsed.candidates?.[0]?.content?.parts?.[0]?.text || '';
        fullText += chunk;

        if (!translationShown && fullText.includes('TRANSLATION:')) {
          const trMatch = fullText.match(/TRANSLATION:\s*(.+?)(?:\n|ALERT:|$)/s);
          if (trMatch && trMatch[1].trim()) {
            sentEl.textContent = trMatch[1].trim();
            sentEl.classList.remove('streaming');
            translationShown = true;
          }
        }
      } catch (e) {}
    }
  }

  const trMatch = fullText.match(/TRANSLATION:\s*(.+?)(?:\nALERT:|$)/s);
  const alMatch = fullText.match(/ALERT:\s*(.+?)(?:\nURGENT:|$)/s);
  const urgMatch = fullText.match(/URGENT:\s*(true|false)/);

  const translation = trMatch ? trMatch[1].trim() : text;
  const alert = alMatch && alMatch[1].trim() !== 'NONE' ? alMatch[1].trim() : null;
  const urgent = urgMatch ? urgMatch[1] === 'true' : false;

  sentEl.textContent = translation;
  sentEl.classList.remove('streaming');

  return { translation, alert, urgent };
}

async function callGeminiChat(msg) {
  const key = getGK();
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:streamGenerateContent?alt=sse&key=${key}`;

  const hist = chatH.slice(-6).map(m => ({ role: m.r === 'u' ? 'user' : 'model', parts: [{ text: m.t }] }));
  const messages = [
    { role: 'user', parts: [{ text: sysPromChat() }] },
    { role: 'model', parts: [{ text: 'فهمت، أنا جاهز.' }] },
    ...hist,
    { role: 'user', parts: [{ text: msg }] }
  ];

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: messages, generationConfig: { temperature: 0.3, maxOutputTokens: 512 } })
  });

  if (!res.ok) throw new Error(res.status);

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullText = '';
  const botEl = addStreamingMsg();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const parsed = JSON.parse(data);
        const chunk = parsed.candidates?.[0]?.content?.parts?.[0]?.text || '';
        fullText += chunk;
        const clean = fullText.replace(/\[ref:\d+\]/g, '').trim();
        botEl.textContent = clean || '...';
        document.getElementById('ai-area').scrollTop = document.getElementById('ai-area').scrollHeight;
      } catch (e) {}
    }
  }

  const refMatch = fullText.match(/\[ref:(\d+)\]/);
  if (refMatch) hlSent(parseInt(refMatch[1]));

  const clean = fullText.replace(/\[ref:\d+\]/g, '').trim();
  botEl.textContent = clean;
  return clean;
}

function langName(c) {
  const m = { ar: 'العربية', en: 'الإنجليزية', zh: 'الصينية', fr: 'الفرنسية', de: 'الألمانية', tr: 'التركية', ru: 'الروسية' };
  return m[c] || c;
}

function addLine(orig, tr, id, scroll = true) {
  const el = document.getElementById('trans-area');
  const d = document.createElement('div');
  d.className = 'sentence'; d.id = 's' + id; d.textContent = tr || orig;
  el.appendChild(d);
  if (scroll) el.scrollTop = el.scrollHeight;
  return d;
}

function hlSent(id) {
  document.querySelectorAll('.sentence').forEach(s => s.classList.remove('hl'));
  const el = document.getElementById('s' + id);
  if (el) {
    el.classList.add('hl');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => el.classList.remove('hl'), 3000);
  }
}

function addMsg(text, role, scroll = true) {
  const el = document.getElementById('ai-area');
  const d = document.createElement('div');
  d.className = 'ai-msg ' + role; d.textContent = text; el.appendChild(d);
  if (scroll) el.scrollTop = el.scrollHeight;
  return d;
}

function addStreamingMsg() {
  const el = document.getElementById('ai-area');
  const d = document.createElement('div');
  d.className = 'ai-msg bot'; d.textContent = '...'; el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  return d;
}

function addAlert(text, urgent = false) {
  const el = document.getElementById('ai-area');
  const d = document.createElement('div');
  d.className = 'alert-bub' + (urgent ? ' urgent' : ''); d.textContent = '⚠ ' + text;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

function updCount() { document.getElementById('sent-count').textContent = sCount + ' جملة'; }

function setStatus(s) {
  const dot = document.getElementById('sdot'), txt = document.getElementById('stxt'), ai = document.getElementById('ai-dot');
  if (s === 'lis') { dot.className = 'sdot lis'; txt.textContent = 'يستمع...'; }
  else if (s === 'proc') { dot.className = 'sdot'; txt.textContent = 'معالجة...'; ai.className = 'sdot on'; }
  else { dot.className = 'sdot'; txt.textContent = 'جاهز'; ai.className = 'sdot'; }
}

async function procText(text) {
  if (!text || text.trim().length < 2 || isProcessing) return;
  isProcessing = true;
  const id = ++sCount;
  const sentEl = addLine(text, '...', id);
  sentEl.classList.add('streaming');
  updCount(); setStatus('proc');

  try {
    const result = await callGeminiStream(text, sentEl);
    sentences.push({ id, orig: text, tr: result.translation });
    saveCur();
    if (result.alert) {
      addAlert(result.alert, result.urgent);
      if (window.innerWidth < 700) switchTab('ai');
    }
  } catch (e) {
    sentEl.textContent = text;
    sentEl.classList.remove('streaming');
    sentences.push({ id, orig: text, tr: text });
  }

  isProcessing = false;
  setStatus('lis');
}

async function doChat() {
  const inp = document.getElementById('chat-inp');
  const msg = inp.value.trim(); if (!msg) return;
  inp.value = '';
  addMsg(msg, 'user');
  chatH.push({ r: 'u', t: msg });
  setStatus('proc');
  if (window.innerWidth < 700) switchTab('ai');

  try {
    const ans = await callGeminiChat(msg);
    chatH.push({ r: 'a', t: ans });
    saveCur();
  } catch (e) {
    addMsg('حدث خطأ: ' + e.message, 'bot');
  }
  setStatus(isRec ? 'lis' : 'ready');
}

function qSend(msg) { document.getElementById('chat-inp').value = msg; doChat(); }

function switchTab(tab) {
  const tr = document.getElementById('mob-trans'), ai = document.getElementById('mob-ai');
  const tbT = document.getElementById('tab-trans'), tbA = document.getElementById('tab-ai');
  if (tab === 'trans') { tr.classList.add('active'); ai.classList.remove('active'); tbT.classList.add('active'); tbA.classList.remove('active'); }
  else { ai.classList.add('active'); tr.classList.remove('active'); tbA.classList.add('active'); tbT.classList.remove('active'); }
}

function toggleMic() { if (isRec) stopRec(); else startRec(); }

function startRec() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) { alert('استخدم Chrome للتعرف على الصوت'); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR();
  rec.lang = cur.src || 'zh-CN';
  rec.continuous = true;
  rec.interimResults = true;
  rec.onstart = () => { isRec = true; setMicUI(true); setStatus('lis'); };
  rec.onend = () => { if (isRec) rec.start(); };
  rec.onerror = (e) => { if (e.error !== 'no-speech' && e.error !== 'aborted') setStatus('ready'); };
  rec.onresult = (e) => {
    let itr = '', fin = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript;
      else itr += e.results[i][0].transcript;
    }
    if (fin) { clearTimeout(silT); procText(fin.trim()); }
    else if (itr) { clearTimeout(silT); silT = setTimeout(() => { if (itr.trim()) procText(itr.trim()); }, 1500); }
  };
  rec.start();
}

function stopRec() {
  isRec = false; clearTimeout(silT);
  if (rec) { rec.onend = null; rec.stop(); }
  setMicUI(false); setStatus('ready');
}

function setMicUI(r) {
  document.getElementById('mic-btn').className = 'mic-btn' + (r ? ' rec' : '');
  document.getElementById('mic-tab-lbl').textContent = r ? 'إيقاف' : 'ميكروفون';
  document.getElementById('tab-mic').style.color = r ? '#E24B4A' : 'var(--text3)';
}

renderList();
</script>
